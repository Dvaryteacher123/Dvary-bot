<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY CLOUD | Image Hosting</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 40px 20px; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        h1 { color: #9d4edd; margin-bottom: 10px; }
        p { color: #aaa; font-size: 14px; }
        .upload-area { border: 2px dashed #444; padding: 30px; margin: 20px 0; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #9d4edd; background: #222; }
        input[type="file"] { display: none; }
        .btn { background: #9d4edd; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        .btn:disabled { background: #555; }
        #result { margin-top: 25px; padding: 15px; background: #222; border-radius: 8px; display: none; word-break: break-all; }
        .copy-btn { background: #444; color: #fff; border: none; padding: 5px 10px; margin-top: 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>DVARY CLOUD 🚀</h1>
    <p>Host picha zako bure kwa kasi ya ajabu.</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <span id="fileStatus">Gusa hapa kuchagua picha</span>
        <input type="file" id="fileInput" accept="image/*" onchange="updateStatus()">
    </div>

    <button class="btn" id="uploadBtn" onclick="startUpload()">PAKIA KWENYE CLOUD</button>

    <div id="result">
        <div style="color: #00ff88; margin-bottom: 10px;">✅ Imefanikiwa!</div>
        <small id="linkText"></small><br>
        <button class="copy-btn" onclick="copyLink()">Copy Link</button>
    </div>
</div>

<script>
    function updateStatus() {
        const input = document.getElementById('fileInput');
        document.getElementById('fileStatus').innerText = input.files[0].name;
    }

    async function startUpload() {
        const fileInput = document.getElementById('fileInput');
        const btn = document.getElementById('uploadBtn');
        const resDiv = document.getElementById('result');
        const linkText = document.getElementById('linkText');

        if (!fileInput.files[0]) return alert("Chagua picha kwanza!");

        btn.disabled = true;
        btn.innerText = "INAPAKIA...";

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();
            
            if (data.url) {
                resDiv.style.display = 'block';
                linkText.innerText = data.url;
                btn.innerText = "TAYARI!";
            }
        } catch (e) {
            alert("Kuna tatizo! Jaribu tena.");
            btn.disabled = false;
            btn.innerText = "PAKIA KWENYE CLOUD";
        }
    }

    function copyLink() {
        const link = document.getElementById('linkText').innerText;
        navigator.clipboard.writeText(link);
        alert("Link imenakiliwa!");
    }
</script>

</body>
</html>
