<div style="max-width: 400px; margin: auto; text-align: center; font-family: sans-serif;">
    <h2>DVAR-PAY ⚡</h2>
    <p>Lipia TZS 2,000 kwa <b>Elia (0799203820)</b></p>
    <p>Kisha paste SMS yote ya muamala hapa chini:</p>
    
    <textarea id="smsInput" rows="5" style="width: 100%;" placeholder="Paste SMS hapa..."></textarea><br><br>
    
    <button onclick="checkPayment()" style="padding: 10px 20px; background: #25D366; color: white; border: none; cursor: pointer;">
        HAKIKI NA UJIUNGE
    </button>
    
    <p id="feedback" style="color: red;"></p>
</div>

<script>
async function checkPayment() {
    const sms = document.getElementById('smsInput').value;
    const feedback = document.getElementById('feedback');
    
    feedback.innerText = "Inahakiki...";
    
    const response = await fetch('/api/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ fullSms: sms })
    });

    const data = await response.json();
    if(data.success) {
        alert("Malipo Safi! Unapelekwa kwenye Group sasa hivi.");
        window.location.href = data.link;
    } else {
        feedback.innerText = data.message;
    }
}
</script>
