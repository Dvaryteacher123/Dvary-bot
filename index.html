<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; width: 350px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { color: #a855f7; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; background: #0f172a; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(90deg, #6366f1, #a855f7); color: white; font-weight: bold; cursor: pointer; }
        .success { display: none; margin-top: 20px; background: rgba(16, 185, 129, 0.2); padding: 15px; border-radius: 12px; border: 1px solid #10b981; }
        .wa-btn { background: #25d366; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; display: inline-block; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>DVARY PAY 🔒</h2>
    <p style="font-size: 12px; color: #94a3b8;">Weka ID ya muamala uliopokea baada ya kutuma TZS 2,000.</p>
    
    <div id="input-area">
        <input type="text" id="transId" placeholder="Mfano: SDC892KLS">
        <button onclick="verify()">HAKIKI MALIPO</button>
    </div>

    <div id="success-area" class="success">
        <p>✅ Malipo Yamethibitishwa!</p>
        <a href="https://wa.me/2557XXXXXXXXX?text=Nimeshalipia_Link_Ya_Video" class="wa-btn">INGIA WHATSAPP</a>
    </div>
</div>

<script>
    async function verify() {
        const id = document.getElementById('transId').value.trim();
        if(!id) return alert("Andika ID kwanza!");

        const response = await fetch(`/api/verify?id=${id}`);
        const result = await response.json();

        if (result.verified) {
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('success-area').style.display = 'block';
        } else {
            alert("❌ ID Haipo! Hakikisha SMS imeshaingia au umeandika kwa usahihi.");
        }
    }
</script>

</body>
</html>
